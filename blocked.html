<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siden er blokeret</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 15px;
            color: #ef4444;
        }

        p {
            font-size: 15px;
            line-height: 1.6;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .divider {
            height: 1px;
            background-color: #334155;
            margin-bottom: 20px;
        }

        .footer {
            font-size: 12px;
            color: #64748b;
        }

        .footer span {
            color: #38bdf8;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🛑</div>
        <h1>Hov! Siden er blokeret</h1>
        <p>Denne hjemmeside er spærret af skolens it-system for at sikre, at der er arbejdsro i timerne, så du kan fokusere på undervisningen.</p>
        
        <div class="divider"></div>
        
        <div class="footer">
            LetSpær - baseret på <span>NetShield</span>
        </div>
    </div>

</body>
</html>
